<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVITA Dashboard — To Be Announced</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="robots" content="noindex,nofollow">
<style>
  :root{--bg:#0a0c10;--fg:#e6edf3;--muted:#7d8590;--accent:#22d3ee}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,"Inter",sans-serif;
    font-weight:300;
    background:radial-gradient(ellipse at top,#101826 0%,#0a0c10 60%);
    color:var(--fg);
    display:grid;place-items:center;
    min-height:100vh;
    padding:24px;
    letter-spacing:.01em;
  }
  .wrap{text-align:center;max-width:560px}
  .mark{
    display:inline-block;
    font-weight:400;
    font-size:14px;
    letter-spacing:.3em;
    color:var(--accent);
    text-transform:uppercase;
    padding:6px 14px;
    border:1px solid rgba(34,211,238,.25);
    border-radius:999px;
    margin-bottom:28px;
  }
  h1{
    font-size:clamp(32px,6vw,56px);
    font-weight:300;
    line-height:1.1;
    margin-bottom:18px;
  }
  p{
    color:var(--muted);
    font-size:16px;
    line-height:1.6;
    margin-bottom:32px;
  }
  a.home{
    display:inline-block;
    color:var(--fg);
    text-decoration:none;
    font-size:14px;
    padding:10px 22px;
    border:1px solid rgba(230,237,243,.15);
    border-radius:10px;
    transition:border-color .2s,background .2s;
  }
  a.home:hover{border-color:var(--accent);background:rgba(34,211,238,.06)}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:8px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.dot{animation:none}}
</style>
</head>
<body>
  <main class="wrap">
    <span class="mark"><span class="dot"></span>To Be Announced</span>
    <h1>SVITA Dashboard</h1>
    <p>This surface is being rebuilt. A new experience is coming soon.</p>
    <a class="home" href="https://svita.ai">svita.ai</a>
  </main>
</body>
</html>
